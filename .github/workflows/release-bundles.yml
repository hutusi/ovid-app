name: Release Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-bundles:
    name: Build Windows MSI
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build release bundle
        shell: bash
        env:
          TAURI_UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_UPDATER_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "${TAURI_UPDATER_PRIVATE_KEY}" ]; then
            echo "Signing key detected; enabling updater artifact generation."
            export TAURI_SIGNING_PRIVATE_KEY="${TAURI_UPDATER_PRIVATE_KEY}"
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${TAURI_UPDATER_PRIVATE_KEY_PASSWORD}"
            bun run tauri build --bundles msi \
              --config '{"bundle":{"createUpdaterArtifacts":true}}'
          else
            echo "No updater signing key configured; building standard release bundles only."
            bun run tauri build --bundles msi
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovid-windows-msi
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
          if-no-files-found: error

      - name: Attach bundle to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
