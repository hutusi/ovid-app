name: Updater Metadata

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.9.1"
        required: true
        type: string
      pub_date:
        description: "RFC 3339 publish date"
        required: true
        type: string
      notes:
        description: "Short release notes for latest.json"
        required: true
        type: string
      windows_url:
        description: "Windows updater artifact URL"
        required: true
        type: string
      windows_signature:
        description: "Windows updater artifact signature content"
        required: true
        type: string
      darwin_aarch64_url:
        description: "macOS arm64 updater artifact URL"
        required: true
        type: string
      darwin_aarch64_signature:
        description: "macOS arm64 updater artifact signature content"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: updater-metadata
  cancel-in-progress: true

jobs:
  publish-latest-json:
    name: Publish latest.json
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Write release notes
        env:
          NOTES: ${{ inputs.notes }}
        run: |
          mkdir -p updater-dist
          printf '%s' "$NOTES" > updater-dist/notes.txt

      - name: Generate latest.json
        env:
          VERSION: ${{ inputs.version }}
          PUB_DATE: ${{ inputs.pub_date }}
          WINDOWS_URL: ${{ inputs.windows_url }}
          WINDOWS_SIGNATURE: ${{ inputs.windows_signature }}
          DARWIN_AARCH64_URL: ${{ inputs.darwin_aarch64_url }}
          DARWIN_AARCH64_SIGNATURE: ${{ inputs.darwin_aarch64_signature }}
        run: |
          node scripts/generate-updater-json.mjs \
            --version "$VERSION" \
            --pub-date "$PUB_DATE" \
            --notes-file updater-dist/notes.txt \
            --platform "windows-x86_64=${WINDOWS_URL}::${WINDOWS_SIGNATURE}" \
            --platform "darwin-aarch64=${DARWIN_AARCH64_URL}::${DARWIN_AARCH64_SIGNATURE}" \
            --output updater-dist/latest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: updater-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
